services:
  - type: web
    name: historibot-api
    runtime: node
    region: frankfurt  # closest to Spain; change to oregon-us for US users
    plan: free
    buildCommand: pnpm install && pnpm --filter @historibot/api build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3001"
      - key: CORS_ORIGIN
        sync: false   # set in Render dashboard
      - key: GROQ_API_KEY
        sync: false   # set in Render dashboard
      - key: REGISTER_WEBHOOK_URL
        sync: false   # set in Render dashboard
